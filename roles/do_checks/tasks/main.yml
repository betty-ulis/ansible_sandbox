---
- name: Gather minimal facts subset
  setup:
    gather_subset:
      - "!all"
      - "os_family"
      - "hardware"

- name: Initialize accumulators for this run
  run_once: true
  delegate_to: localhost
  set_fact:
    executed_checks_count: 0
    all_checks: {}
    skipped_checks: {}
    unimplemented_checks: {}

- name: Resolve which checks to run based on selected groups
  include_tasks: resolve_checks_to_run.yml

- name: Run pre-tasks for selected groups
  include_tasks: "{{ pre_task_name }}.yml"
  loop: "{{ relevant_pre_tasks }}"
  loop_control:
    loop_var: pre_task_name

- name: Run selected groups
  include_tasks: run_checks_group.yml
  loop: "{{ selected_groups_normalized }}"
  loop_control:
    loop_var: group_name

- name: Collect accumulated check results per host
  set_fact:
    host_results:
      Flow: Upgrading from {{ pumpkin_version }} to {{ version | default('some version') }}
      Counts - Executed: "{{ executed_checks_count }}"
      Counts - Issues: "{{ dict(all_checks.keys() | zip(all_checks.values() | map('length'))) }}"
      Counts - Skipped: "{{ skipped_checks | length }}"
      Issues details: "{{ all_checks }}"
      Skipped: "{{ skipped_checks }}"
      Unimplemented: "{{ unimplemented_checks }}"

- name: Display host results
  debug:
    msg: "{{ host_results }}"

- name: Initialize overall aggregated results
  run_once: true
  delegate_to: localhost
  delegate_facts: true
  set_fact:
    overall_results:
      Counts - Hosts Total: "{{ ansible_play_hosts | length }}"
      Counts - Issues: {}
      Counts - Skipped: 0
      Counts - no Issues: 0
      Hosts with Issues: {}
      Hosts with Skipped: []
      Hosts with no Issues: []

- name: Aggregate host results across all play hosts
  run_once: true
  include_tasks: aggregate_host.yml
  loop: "{{ ansible_play_hosts }}"
  loop_control:
    loop_var: aggregated_host

- name: Display overall aggregated results
  run_once: true
  delegate_to: localhost
  debug:
    var: overall_results
