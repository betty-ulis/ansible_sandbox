#  when:
#    - check_errors | length > 0
#    - check.fail_strategy == 'WARNING'
#
#- name: Accumulate errors for {{ check.name }}
#  set_fact:
#   all_checks_errors:   "{{ all_checks_errors + check_errors }}"
#  when:
#    - check_errors | length > 0
#    - check.fail_strategy == 'ERROR'

- name: Accumulate warnings for {{ check.name }}
  set_fact:
    all_checks_warnings: "{{ all_checks_warnings | ansible.builtin.combine({check.name: check_errors}) }}"
  when:
    - check_errors | length > 0
    - check.fail_strategy == 'WARNING'

- name: Accumulate errors for {{ check.name }}
  set_fact:
   all_checks_errors:   "{{ all_checks_errors | ansible.builtin.combine({check.name: check_errors}) }}"
  when:
    - check_errors | length > 0
    - check.fail_strategy == 'ERROR'
