---
- name: Initialize variables for {{ check.name }}
  set_fact:
    check_errors: ''
    check_details: {}
    check_skipped: null
    executed_checks_count: "{{ executed_checks_count + 1 }}"


- name: TEMPORARY Debug group and check
  debug:
    msg: "Running check {{ check.name }} from group {{ group_name }} with fail strategy {{ check.fail_strategy }}"


- name: Run check {{ check.name }}
  include_tasks: "checks/{{ group_name }}/{{ check.name }}.yml"


- name: Accumulate skipped {{ check.name }}
  set_fact:
    skipped_checks: "{{ skipped_checks | ansible.builtin.combine({check.name: check_skipped}) }}"
  when:
    - check_skipped is not none

- name: Route check output by severity
  set_fact:
    all_checks: >-
      {{
        all_checks
        | combine(
            { check.fail_strategy: (all_checks.get(check.fail_strategy, {}) | combine({check.name: check_errors})) },
            recursive=True
          )
      }}
  when: check_errors | length > 0
