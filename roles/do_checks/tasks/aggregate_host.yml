---
- name: Aggregate this host's results into overall_results
  run_once: true
  delegate_to: localhost
  delegate_facts: true
  block:

  - name: Prepare host aggregation variables - issue details and whether was skipped
    set_fact:
      _host_issues: "{{ (hostvars[aggregated_host].host_results['Counts - Issues'] | default({})) }}"
      _host_has_skipped: "{{ (hostvars[aggregated_host].host_results['Counts - Skipped'] | default(0)) | int > 0 }}"

  - name: Aggregate skipped / clean host counters
    vars:
      _host_is_clean: "{{ (_host_issues | length == 0) and not _host_has_skipped }}"
    set_fact:
      overall_results: >-
        {{
          overall_results | combine({
            'Counts - Skipped': overall_results['Counts - Skipped'] + (1 if _host_has_skipped else 0),
            'Counts - no Issues': overall_results['Counts - no Issues'] + (1 if _host_is_clean else 0),
            'Hosts with Skipped': overall_results['Hosts with Skipped'] + ([aggregated_host] if _host_has_skipped else []),
            'Hosts with no Issues': overall_results['Hosts with no Issues'] + ([aggregated_host] if _host_is_clean else [])
          }, recursive=True)
        }}

  - name: Aggregate issue counts and host lists per severity
    vars:
      current_issue_count: "{{ overall_results['Counts - Issues'].get(severity, 0) }}"
      current_issue_hosts: "{{ overall_results['Hosts with Issues'].get(severity, []) }}"
    set_fact:
      overall_results: >-
        {{
          overall_results | combine(
            {
              'Counts - Issues': {
                severity: current_issue_count + 1
              },
              'Hosts with Issues': {
                severity: current_issue_hosts + [aggregated_host]
              }
            },
            recursive=True
          )
        }}
    loop: "{{ _host_issues.keys() | list }}"
    loop_control:
      loop_var: severity