#
#    - name: check_script_location
#      fail_strategy: "ERROR"

    - name: check_docker_version
      fail_strategy: "WARNING"

  domain_checks:
    - name: check_current_version
      fail_strategy: "ERROR"

    - name: check_target_version
      fail_strategy: "ERROR"

    - name: check_upgrade_path
      fail_strategy: "ERROR"
