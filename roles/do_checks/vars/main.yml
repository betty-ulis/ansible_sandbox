---
# Variables for do_checks role

relevant_pre_tasks:
  - "{{ tasks_path }}/check_pumpkin_version"

check_groups:
  system_checks:
    - name: check_required_tools
      fail_strategy: "ERROR"

    - name: check_script_location
      fail_strategy: "ERROR"

    - name: check_docker_responsiveness
      pre_tasks:
        - common/get_docker_info
      fail_strategy: "ERROR"

    - name: check_docker_version
      pre_tasks:
        - common/get_docker_info
      fail_strategy: "WARNING"

    - name: check_os_version
      fail_strategy: "WARNING"

    - name: check_disk_space
      pre_tasks:
        - common/get_docker_info
      fail_strategy: "ERROR"

    - name: check_cpu_avx
      fail_strategy: "ERROR"

  domain_checks:
    - name: check_current_version
      fail_strategy: "ERROR"

    - name: check_target_version
      fail_strategy: "ERROR"

    - name: check_upgrade_path
      fail_strategy: "ERROR"
